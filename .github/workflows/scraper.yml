name: OLX Parser

on:
  schedule:
    - cron: '0 */2 * * *' # Запуск кожні 2 години
  workflow_dispatch: # Дозволяє запускати скрипт вручну кнопкою

permissions:
  contents: write # Дає боту право записувати оновлений data.json у репозиторій

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run parser
        run: python parse.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data.json
          # Якщо є зміни, комітимо і пушимо. Якщо даних нових немає - ігноруємо.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Оновлено data.json" && git push)
          
