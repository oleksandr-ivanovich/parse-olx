<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моніторинг будинків OLX</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* Стилі для попапа */
        .popup-content { max-width: 250px; }
        .title { font-weight: 600; font-size: 14px; margin-bottom: 8px; line-height: 1.3; }
        .price { color: #1f7a54; font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .location { color: #555; font-size: 12px; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .btn { display: block; background: #002f34; color: white !important; text-align: center; padding: 8px; text-decoration: none; border-radius: 4px; font-size: 13px; font-weight: bold; transition: background 0.2s; }
        .btn:hover { background: #00454d; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Ініціалізація карти. Координати центру України, зум 6
    const map = L.map('map').setView([48.3794, 31.1656], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 18
    }).addTo(map);

    // Відносний шлях до файлу (працює ідеально для GitHub Pages)
    // Додаємо timestamp, щоб браузер завжди завантажував найсвіжіший файл
    const dataUrl = `data.json?t=${new Date().getTime()}`;

    fetch(dataUrl)
        .then(response => {
            if (!response.ok) throw new Error("Помилка завантаження бази даних");
            return response.json();
        })
        .then(data => {
            console.log(`Завантажено оголошень: ${data.length}`);
            
            data.forEach(item => {
                if (item.lat && item.lng) {
                    const popupHTML = `
                        <div class="popup-content">
                            <div class="title">${item.title}</div>
                            <div class="price">${item.price}</div>
                            <div class="location">📍 ${item.location}</div>
                            <a href="${item.link}" target="_blank" class="btn">Відкрити на OLX</a>
                        </div>
                    `;

                    L.marker([item.lat, item.lng])
                        .addTo(map)
                        .bindPopup(popupHTML);
                }
            });
        })
        .catch(error => {
            console.error("Виникла помилка:", error);
        });
</script>

</body>
</html>
